<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRS Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tutorialjinni.com/PapaParse/5.4.1/papaparse.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
        }
        .dropzone {
            transition: all 0.3s ease;
        }
        .dropzone:hover, .dropzone.dragover {
            transform: scale(1.02);
        }
        .scrollbar-thin::-webkit-scrollbar {
            width: 8px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <div class="bg-gradient-to-r from-blue-600 to-blue-700 rounded-2xl shadow-lg px-8 py-6">
                <h1 class="text-3xl font-bold text-white">SRS Generator</h1>
                <p class="mt-2 text-blue-100 text-lg">Select a CSV SAR file to generate SRS reports for each group</p>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-md p-6">
                    <input type="file" id="csvFileInput" class="hidden" accept=".csv">
                    <label for="csvFileInput" class="dropzone cursor-pointer">
                        <div class="border-2 border-dashed border-gray-300 rounded-xl p-12 flex flex-col items-center justify-center hover:border-blue-500 hover:bg-blue-50 transition-all">
                            <svg class="w-16 h-16 text-gray-400 hover:text-blue-500 transition-colors" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l-3.75 3.75M12 9.75l3.75 3.75M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-18 0v-2.25A2.25 2.25 0 015.25 12h13.5A2.25 2.25 0 0121 14.25v2.25"/>
                            </svg>
                            <span class="mt-4 font-semibold text-gray-600 hover:text-blue-600 text-lg">Select CSV File</span>
                            <span class="mt-2 text-sm text-gray-400">or drag and drop here</span>
                        </div>
                    </label>
                    <p id="fileName" class="mt-4 text-center text-sm text-gray-500 font-medium"></p>
                </div>

                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                        <h2 class="text-lg font-semibold text-gray-700">Generated Reports</h2>
                        <span id="reportCount" class="bg-blue-100 text-blue-700 text-sm font-medium px-3 py-1 rounded-full hidden">0 reports</span>
                    </div>
                    <div id="reportList" class="p-4 min-h-[120px] bg-gray-50">
                        <p class="placeholder text-center text-gray-400 py-8">No reports generated yet.</p>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div id="errors-section" class="hidden bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="bg-red-500 px-6 py-4 flex items-center justify-between">
                        <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                            </svg>
                            Problems
                            <span id="errorCount" class="bg-red-700 text-red-100 text-xs font-medium px-2 py-0.5 rounded-full">0</span>
                        </h2>
                    </div>
                    <div id="errorList" class="p-4 max-h-[36rem] overflow-y-auto scrollbar-thin bg-red-50 text-sm font-mono">
                    </div>
                </div>

                <div id="warnings-section" class="hidden bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="bg-yellow-500 px-6 py-4 flex items-center justify-between">
                        <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            Template Warnings
                            <span id="warningCount" class="bg-yellow-700 text-yellow-100 text-xs font-medium px-2 py-0.5 rounded-full">0</span>
                        </h2>
                    </div>
                    <div id="warningList" class="p-4 max-h-96 overflow-y-auto scrollbar-thin bg-yellow-50 text-sm font-mono">
                    </div>
                </div>

                <div id="student-ids-section" class="hidden bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="bg-blue-500 px-6 py-4 flex items-center justify-between">
                        <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            Student IDs with Errors
                        </h2>
                        <button id="copyStudentIds" class="bg-blue-700 hover:bg-blue-800 text-white text-sm font-medium px-3 py-1 rounded transition-colors flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
                            </svg>
                            Copy
                        </button>
                    </div>
                    <div id="studentIdsList" class="p-4 max-h-48 overflow-y-auto scrollbar-thin bg-blue-50 text-sm font-mono text-gray-700 break-all">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="dataValidation.js"></script>
    <script src="generateReports.js"></script>
</body>
</html>
